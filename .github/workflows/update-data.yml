name: Update Market Data - CSV Refresh

on:
  schedule:
    # Run at 9 AM EST weekdays only (before market open)
    - cron: '0 14 * * 1-5'   # 14:00 UTC = 9:00 AM EST (Mon-Fri)
    # Run at 5 PM EST weekdays only (after market close)
    - cron: '0 22 * * 1-5'   # 22:00 UTC = 5:00 PM EST (Mon-Fri)
  workflow_dispatch:
    inputs:
      index:
        description: 'Market index to update'
        required: false
        default: 'ALL'
        type: choice
        options:
          - ALL
          - SP500
          - SP400
          - SP600
          - NASDAQ100
          - DOW30
          - COMBINED

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data and update CSVs
        env:
          INDEX: ${{ github.event.inputs.index || 'ALL' }}
        run: |
          echo "📊 Updating indices: $INDEX"
          python market_tracker.py --mode cli --index $INDEX

      - name: Commit updated CSV files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Fetch latest changes first
          git fetch origin main

          # Add all CSV files (in data directory structure)
          git add data/

          # Check if there are changes
          if git diff --cached --quiet; then
              echo "✅ No changes to CSV files"
          else
              git commit -m "Update market data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
              git push origin main
              echo "✅ CSV files updated and pushed to main"
          fi

      - name: Workflow Summary
        if: always()
        run: |
          echo "=== Workflow Summary ==="
          echo "Timestamp: $(date)"
          echo "Trigger: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger - Index: ${{ github.event.inputs.index }}"
          else
            echo "Scheduled trigger - All indices updated"
          fi
          echo ""
          echo "✅ Data stored in CSV files (committed to Git)"
          echo "📊 Streamlit app will load data from CSV files"